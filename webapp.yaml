apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
  labels:
    app: webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp # using it to connect with service
    spec:
      containers:
      - name: mongo-express
        image: mongo-express:1.0
        command:
          - mongod
          - --bind_ip_all
        ports:
        - containerPort: 8081  
        resources:
          requests:
            cpu: 250m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        env: 
        - name: ME_CONFIG_MONGODB_ADMINUSERNAME 
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: mongo-user
        - name: ME_CONFIG_MONGODB_ADMINPASSWORD   
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: mongo-password
        - name: ME_CONFIG_MONGODB_SERVER         
          valueFrom:
            configMapKeyRef: # connecting config file - mongo config with webapp
              name: mongo-config
              key: mongo-url

---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
spec:
  type: NodePort
  selector:
    app: webapp 
  ports:
    - protocol: TCP
      port: 8081 # to render application on web
      targetPort: 8081 # target port comes from container port
      nodePort: 30020
